<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDA Portal - Single File</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --background: #ffffff;
            --foreground: #09090b;
            --card: #ffffff;
            --card-foreground: #09090b;
            --popover: #ffffff;
            --popover-foreground: #09090b;
            --primary: #5A5FF2;
            --primary-foreground: #ffffff;
            --secondary: #f4f4f5;
            --secondary-foreground: #18181b;
            --muted: #f4f4f5;
            --muted-foreground: #71717a;
            --accent: #f4f4f5;
            --accent-foreground: #18181b;
            --destructive: #ef4444;
            --destructive-foreground: #fafafa;
            --border: #e4e4e7;
            --input: #e4e4e7;
            --ring: #5A5FF2;
            --radius: 0.5rem;
            --sidebar: #f8fafc;
        }

        .dark {
            --background: #09090b;
            --foreground: #fafafa;
            --card: #09090b;
            --card-foreground: #fafafa;
            --popover: #09090b;
            --popover-foreground: #fafafa;
            --primary: #5A5FF2;
            --primary-foreground: #ffffff;
            --secondary: #27272a;
            --secondary-foreground: #fafafa;
            --muted: #27272a;
            --muted-foreground: #a1a1aa;
            --accent: #27272a;
            --accent-foreground: #fafafa;
            --destructive: #7f1d1d;
            --destructive-foreground: #fafafa;
            --border: #27272a;
            --input: #27272a;
            --ring: #5A5FF2;
            --sidebar: #020617;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1 { font-size: 1.5rem; font-weight: 600; }
        h2 { font-size: 1.25rem; font-weight: 500; }
        h3 { font-size: 1.125rem; font-weight: 500; }
        p { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-sm { font-size: 0.875rem; }
        .text-muted { color: var(--muted-foreground); }
        .font-medium { font-weight: 500; }
        .font-semibold { font-weight: 600; }

        /* Layout */
        .min-h-screen { min-height: 100vh; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .border-b { border-bottom: 1px solid var(--border); }
        .border-r { border-right: 1px solid var(--border); }
        .max-w-7xl { max-width: 80rem; margin: 0 auto; }
        .flex-1 { flex: 1; }

        /* Components */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            border: 1px solid transparent;
            gap: 0.5rem;
        }
        .btn-primary { background-color: var(--primary); color: var(--primary-foreground); }
        .btn-primary:hover { opacity: 0.9; }
        .btn-outline { background-color: transparent; border-color: var(--border); color: var(--foreground); }
        .btn-outline:hover { background-color: var(--accent); }
        .btn-ghost { background-color: transparent; color: var(--foreground); }
        .btn-ghost:hover { background-color: var(--accent); }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

        .card {
            background-color: var(--card);
            color: var(--card-foreground);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .card-header { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.375rem; }
        .card-title { font-size: 1rem; font-weight: 600; }
        .card-content { padding: 1.5rem; padding-top: 0; }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
        }
        .badge-secondary { background-color: var(--secondary); color: var(--secondary-foreground); }
        .badge-outline { border-color: var(--border); color: var(--foreground); }

        .separator { height: 1px; background-color: var(--border); margin: 1rem 0; }

        .input {
            width: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--input);
            background-color: var(--background);
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
        }
        .input:focus { outline: 2px solid var(--ring); outline-offset: -1px; }

        /* Sidebar */
        .sidebar { width: 72px; background-color: var(--sidebar); border-right: 1px solid var(--border); }

        /* Utilities */
        .hidden { display: none; }
        .grid { display: grid; }
        .grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        .w-full { width: 100%; }

        /* App Specific */
        #app-root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="app-root">
        <!-- Navigation Shell -->
        <div class="flex min-h-screen">
            <div class="sidebar"></div>
            <div class="flex-1 flex flex-col">
                <header class="border-b bg-background px-6 py-4 flex items-center justify-between">
                    <div id="header-content">
                        <h1 id="page-title">Loading...</h1>
                        <p id="page-subtitle" class="text-sm text-muted"></p>
                    </div>
                    <div id="header-actions" class="flex gap-2"></div>
                </header>
                <main id="main-content" class="p-6 overflow-auto"></main>
            </div>
        </div>
    </div>

    <script>
        // Router State
        const state = {
            currentPage: 'calculator', // default
            pages: {
                calculator: {
                    title: 'CDA Breakdown',
                    subtitle: '1284 Willow Creek Dr • Michael Loft',
                    render: renderCalculator
                },
                library: {
                    title: 'CDA Component Library',
                    subtitle: 'Atomic components for real estate finance workflows',
                    render: renderLibrary
                }
                // Add more pages here
            }
        };

        function navigate(page) {
            state.currentPage = page;
            window.location.hash = page;
            render();
        }

        function render() {
            const pageId = window.location.hash.replace('#', '') || state.currentPage;
            const page = state.pages[pageId] || state.pages.calculator;
            
            document.getElementById('page-title').textContent = page.title;
            document.getElementById('page-subtitle').textContent = page.subtitle;
            
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = page.render();
            
            lucide.createIcons();
        }

        function renderCalculator() {
            return `
                <div class="grid" style="grid-template-columns: 300px 1fr 320px; gap: 1.5rem;">
                    <!-- Left Panel -->
                    <div class="flex flex-col gap-4">
                        <div class="card">
                            <div class="card-header">
                                <h2 class="card-title text-sm">Transaction Participants</h2>
                            </div>
                            <div class="card-content flex flex-col gap-4">
                                <div>
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-xs font-medium text-muted">Listing Side</span>
                                        <span class="badge badge-secondary text-xs">60%</span>
                                    </div>
                                    <div class="card p-3 mb-2">
                                        <div class="flex items-start gap-2 mb-2">
                                            <div class="size-8 rounded-full bg-muted flex items-center justify-center text-xs font-medium" style="width:32px; height:32px;">IC</div>
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2">
                                                    <p class="text-sm font-medium">Ila Corcoran</p>
                                                    <span class="badge badge-outline" style="font-size:10px; height:16px;">Lead</span>
                                                </div>
                                                <p class="text-xs text-muted">80/20 Standard</p>
                                            </div>
                                            <button class="btn btn-ghost btn-sm" style="width:24px; height:24px; padding:0;"><i data-lucide="edit" style="width:12px;"></i></button>
                                        </div>
                                        <div class="separator" style="margin: 0.5rem 0;"></div>
                                        <div class="flex flex-col gap-1 text-xs">
                                            <div class="flex justify-between"><span class="text-muted">Commission %</span><span class="font-medium">60%</span></div>
                                            <div class="flex justify-between"><span class="text-muted">Gross Amount</span><span class="font-medium">$14,550</span></div>
                                            <div class="flex justify-between"><span class="text-muted">Net Estimate</span><span class="font-medium" style="color: #16a34a;">$11,215</span></div>
                                        </div>
                                    </div>
                                    <div style="height: 8px; background: var(--muted); border-radius: 999px; overflow: hidden; margin-bottom: 0.5rem;">
                                        <div style="height: 100%; width: 60%; background: var(--primary);"></div>
                                    </div>
                                    <button class="btn btn-outline w-full text-xs" style="height:32px;"><i data-lucide="plus" style="width:12px;"></i> Add Co-agent</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Center Panel -->
                    <div class="flex flex-col gap-4">
                        <div>
                            <h2 class="font-medium">Finance Breakdown</h2>
                            <p class="text-xs text-muted">Automatic estimate generated from deal terms and assigned defaults.</p>
                        </div>
                        <div class="card">
                            <div class="card-header"><h2 class="card-title text-sm">Gross Commission</h2></div>
                            <div class="card-content">
                                <div class="grid grid-cols-3 gap-4 text-xs">
                                    <div><span class="text-muted block mb-1">Purchase Price</span><span class="font-medium">$500,000</span></div>
                                    <div><span class="text-muted block mb-1">Commission %</span><span class="font-medium">5.0%</span></div>
                                    <div><span class="text-muted block mb-1">Gross Commission</span><span class="font-medium" style="font-size:1rem;">$25,000</span></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Panel -->
                    <div class="flex flex-col gap-4">
                        <div class="card" style="position: sticky; top: 1.5rem;">
                            <div class="card-header"><h2 class="card-title text-sm">CDA Summary</h2></div>
                            <div class="card-content flex flex-col gap-3">
                                <div class="flex flex-col gap-2 text-sm">
                                    <div class="flex justify-between"><span class="text-muted">Gross Commission</span><span class="font-medium">$25,000</span></div>
                                    <div class="flex justify-between"><span class="text-muted">Pre-split Deductions</span><span class="font-medium" style="color: #dc2626;">-$750</span></div>
                                    <div class="separator" style="margin: 0.5rem 0;"></div>
                                    <div class="flex justify-between"><span class="text-muted">Split Basis</span><span class="font-medium">$24,250</span></div>
                                    <div class="flex justify-between"><span class="text-muted">Post-split Deductions</span><span class="font-medium" style="color: #dc2626;">-$425</span></div>
                                    <div class="separator" style="margin: 0.5rem 0;"></div>
                                    <div class="flex justify-between font-medium"><span>Estimated Agent Net</span><span class="font-semibold" style="color: #16a34a; font-size: 1rem;">$18,975</span></div>
                                </div>
                                <button class="btn btn-primary w-full text-sm"><i data-lucide="send" style="width:12px;"></i> Send to Agent</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLibrary() {
            return `<h2>Component Library (TBD)</h2><button class="btn btn-primary" onclick="navigate('calculator')">Back to Calculator</button>`;
        }

        // Init
        window.addEventListener('hashchange', render);
        render();
    </script>
</body>
</html>
